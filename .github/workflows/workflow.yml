name: CI workflow
on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.9-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4
	  - name: install dependencies
		run: |python -m pip install --upgrade pip 
		-name:Run flake8 Lint
    run: |flake8
    -name: Run unit tests with nose
    run:|nosetests
		